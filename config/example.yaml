experiment_name: "iris_classification_demo"
dataset:
  source: sklearn
  name: iris
models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
  random_forest:
    n_estimators: 100
    max_depth: 5
preprocessing:
  scale: true
  encode_target: true
cv:
  strategy: stratified_kfold
  folds: 5
metrics:
  accuracy: true
  f1: true
  auc_roc: true
tuning:
  enabled: false
