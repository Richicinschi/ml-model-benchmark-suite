experiment_name: "iris_tuning_demo"
dataset:
  source: sklearn
  name: iris
models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
  random_forest:
    n_estimators: 100
    max_depth: 5
preprocessing:
  scale: true
  encode_target: true
cv:
  strategy: stratified_kfold
  folds: 3
metrics:
  accuracy: true
  f1: true
  auc_roc: true
tuning:
  enabled: true
  method: grid
  scoring: accuracy
  cv_folds: 3
  param_spaces:
    logistic_regression:
      C: [0.1, 1.0, 10.0]
    random_forest:
      max_depth: [3, 5]
