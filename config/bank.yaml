experiment_name: "bank_marketing_benchmark"
dataset:
  source: csv
  path: datasets/bank/bank-additional-full.csv
  target_column: y
  read_options:
    sep: ";"
models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
  random_forest:
    n_estimators: 100
    max_depth: 10
preprocessing:
  scale: true
  encode_target: true
cv:
  strategy: stratified_kfold
  folds: 5
metrics:
  accuracy: true
  f1: true
  auc_roc: true
tuning:
  enabled: false
