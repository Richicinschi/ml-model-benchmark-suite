experiment_name: airline_delay_2015_september_tuning

dataset:
  source: csv
  path: datasets/airline-delay-and-cancellation-data/2015_september.csv
  target_column: CANCELLED

models:
  - logistic_regression
  - random_forest

preprocessing:
  scale: standard
  imputation: median
  encoding: one_hot

cv:
  strategy: stratified_kfold
  folds: 3

tuning:
  enabled: true
  method: grid
  cv_folds: 2
  n_jobs: 1
  param_spaces:
    logistic_regression:
      C: [0.1, 1.0, 10.0]
    random_forest:
      n_estimators: [50, 100]
      max_depth: [5, 10]

tags:
  - airline
  - "2015"
  - september
  - tuning
  - full-audit
