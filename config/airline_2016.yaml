experiment_name: airline_delay_2016_benchmark
dataset:
  source: csv
  path: datasets/airline-delay-and-cancellation-data/2016_sample_100k.csv
  target_column: CANCELLED
models:
  logistic_regression:
    max_iter: 1000
  random_forest:
    n_estimators: 50
    random_state: 42
    n_jobs: 2
preprocessing:
  scale: standard
  imputation: median
  encoding: one_hot
cv:
  strategy: stratified_kfold
  folds: 3
tags:
  - airline
  - large-scale
  - classification
notes: Benchmark run on 100K sampled airline delay data (2016) with balanced cancellation target.
